<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinic Worklist — SRO Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#060a12; color:#e0e0e0; font-family:'Rajdhani',sans-serif; min-height:100vh; }

        .top-bar {
            display:flex; align-items:center; justify-content:space-between;
            padding:14px 24px; background:rgba(10,14,23,0.95);
            border-bottom:1px solid rgba(0,229,255,0.1);
        }
        .top-bar .logo { font-family:'Orbitron',monospace; color:#00e5ff; font-size:16px; letter-spacing:2px; }
        .top-bar .nav-links { display:flex; gap:16px; }
        .top-bar .nav-links a {
            color:rgba(255,255,255,0.5); text-decoration:none; font-size:14px; font-weight:500;
            padding:4px 10px; border-radius:4px; transition:all 0.15s;
        }
        .top-bar .nav-links a:hover, .top-bar .nav-links a.active { color:#00e5ff; background:rgba(0,229,255,0.08); }

        .page-header {
            padding:20px 24px 16px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;
        }
        .page-title { font-family:'Orbitron',monospace; color:#00e5ff; font-size:22px; letter-spacing:2px; }

        /* Date nav */
        .date-nav { display:flex; align-items:center; gap:8px; }
        .date-nav button {
            background:rgba(0,229,255,0.08); border:1px solid rgba(0,229,255,0.2); color:#00e5ff;
            font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:600; padding:8px 14px;
            border-radius:6px; cursor:pointer; transition:all 0.15s;
        }
        .date-nav button:hover { background:rgba(0,229,255,0.18); border-color:rgba(0,229,255,0.5); }
        .date-nav .date-display {
            font-family:'Orbitron',monospace; font-size:14px; color:#fff; padding:8px 18px;
            background:rgba(0,229,255,0.05); border:1px solid rgba(0,229,255,0.15); border-radius:6px;
            min-width:180px; text-align:center; cursor:pointer;
        }
        .date-nav .date-display:hover { border-color:rgba(0,229,255,0.4); }

        /* Filters */
        .filters { display:flex; gap:10px; align-items:center; }
        .filters select {
            background:rgba(12,16,28,0.9); color:#ccc; border:1px solid rgba(0,229,255,0.15);
            padding:8px 12px; border-radius:6px; font-family:'Rajdhani',sans-serif; font-size:14px;
        }
        .btn-add {
            background:rgba(0,229,255,0.1); border:1px solid rgba(0,229,255,0.3); color:#00e5ff;
            font-family:'Orbitron',monospace; font-size:11px; letter-spacing:1px; padding:8px 16px;
            border-radius:6px; cursor:pointer; transition:all 0.15s;
        }
        .btn-add:hover { background:rgba(0,229,255,0.2); border-color:rgba(0,229,255,0.6); }

        /* Summary bar */
        .summary-bar {
            display:flex; gap:16px; padding:0 24px 12px; flex-wrap:wrap;
        }
        .summary-item {
            display:flex; align-items:center; gap:6px; font-size:13px; color:rgba(255,255,255,0.5);
        }
        .summary-item .count {
            font-family:'Orbitron',monospace; font-size:14px; font-weight:600;
            padding:2px 10px; border-radius:10px; min-width:28px; text-align:center;
        }
        .count-total { background:rgba(0,229,255,0.1); color:#00e5ff; }
        .count-checkedin { background:rgba(0,229,255,0.15); color:#00e5ff; }
        .count-inprogress { background:rgba(255,171,0,0.15); color:#ffab00; }
        .count-completed { background:rgba(76,175,80,0.15); color:#4caf50; }
        .count-noshow { background:rgba(244,67,54,0.1); color:#f44336; }

        /* Table */
        .table-wrap { padding:0 24px; overflow-x:auto; }
        table { width:100%; border-collapse:collapse; }
        thead th {
            font-family:'Orbitron',monospace; font-size:11px; color:rgba(0,229,255,0.6);
            letter-spacing:1px; text-transform:uppercase; padding:10px 12px; text-align:left;
            border-bottom:1px solid rgba(0,229,255,0.15); position:sticky; top:0;
            background:#060a12;
        }
        tbody tr { transition:background 0.15s; }
        tbody tr:nth-child(odd) { background:rgba(12,16,28,0.6); }
        tbody tr:nth-child(even) { background:rgba(12,16,28,0.3); }
        tbody tr:hover { background:rgba(0,229,255,0.05); }
        tbody tr.row-active { border-left:3px solid #00e5ff; }
        tbody tr.row-completed { opacity:0.5; }
        tbody tr.row-noshow { opacity:0.35; text-decoration:line-through; }
        tbody td { padding:10px 12px; font-size:14px; vertical-align:middle; }

        .patient-link { color:#fff; text-decoration:none; font-weight:600; transition:color 0.15s; }
        .patient-link:hover { color:#00e5ff; }

        /* Badges */
        .badge {
            display:inline-block; padding:2px 10px; border-radius:10px;
            font-size:11px; font-weight:600; letter-spacing:0.5px; text-transform:uppercase;
        }
        .badge-new { background:rgba(0,229,255,0.15); color:#00e5ff; }
        .badge-follow { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.6); }
        .badge-preop { background:rgba(255,171,0,0.15); color:#ffab00; }
        .badge-postop { background:rgba(76,175,80,0.15); color:#4caf50; }
        .badge-injection { background:rgba(156,39,176,0.15); color:#ce93d8; }
        .badge-consult { background:rgba(33,150,243,0.15); color:#64b5f6; }

        .badge-scheduled { background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.4); }
        .badge-checked_in { background:rgba(0,229,255,0.15); color:#00e5ff; }
        .badge-in_progress { background:rgba(255,171,0,0.15); color:#ffab00; }
        .badge-completedst { background:rgba(76,175,80,0.15); color:#4caf50; }
        .badge-no_show { background:rgba(244,67,54,0.1); color:#f44336; }
        .badge-cancelled { background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.3); }

        .pain-low { color:#4caf50; } .pain-mid { color:#ffab00; } .pain-high { color:#f44336; }
        .pain-none { color:rgba(255,255,255,0.3); }

        .stage-badge {
            font-size:11px; padding:2px 8px; border-radius:8px;
            background:rgba(0,229,255,0.08); color:rgba(0,229,255,0.7);
        }

        /* Action buttons */
        .actions { display:flex; gap:6px; }
        .btn-cockpit {
            background:rgba(0,229,255,0.1); border:1px solid rgba(0,229,255,0.25); color:#00e5ff;
            font-family:'Orbitron',monospace; font-size:10px; letter-spacing:1px; padding:5px 10px;
            border-radius:4px; cursor:pointer; text-decoration:none; transition:all 0.15s; white-space:nowrap;
        }
        .btn-cockpit:hover { background:rgba(0,229,255,0.2); border-color:rgba(0,229,255,0.5); }
        .btn-status {
            background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:rgba(255,255,255,0.5);
            font-size:14px; padding:4px 8px; border-radius:4px; cursor:pointer; transition:all 0.15s;
        }
        .btn-status:hover { background:rgba(255,255,255,0.1); color:#fff; }

        /* Empty state */
        .empty-state {
            text-align:center; padding:60px 20px; color:rgba(255,255,255,0.3);
        }
        .empty-state h3 { font-family:'Orbitron',monospace; color:rgba(0,229,255,0.4); margin-bottom:8px; }

        /* Footer */
        .footer {
            padding:16px 24px; display:flex; justify-content:space-between; align-items:center;
            color:rgba(255,255,255,0.25); font-size:12px; margin-top:20px;
            border-top:1px solid rgba(0,229,255,0.06);
        }
        .footer a { color:rgba(0,229,255,0.5); text-decoration:none; }
        .footer a:hover { color:#00e5ff; }

        /* Calendar popup */
        .cal-overlay {
            display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:200;
            align-items:center; justify-content:center;
        }
        .cal-overlay.open { display:flex; }
        .cal-box {
            background:rgba(10,14,23,0.98); border:1px solid rgba(0,229,255,0.2); border-radius:12px;
            padding:20px; min-width:300px;
        }
        .cal-header {
            display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;
        }
        .cal-header span { font-family:'Orbitron',monospace; font-size:14px; color:#00e5ff; }
        .cal-header button {
            background:none; border:none; color:#00e5ff; font-size:18px; cursor:pointer; padding:4px 8px;
        }
        .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; text-align:center; }
        .cal-day-label { font-size:11px; color:rgba(0,229,255,0.4); padding:4px; font-weight:600; }
        .cal-day {
            padding:8px 4px; font-size:13px; border-radius:6px; cursor:pointer; color:rgba(255,255,255,0.5);
            transition:all 0.15s; position:relative;
        }
        .cal-day:hover { background:rgba(0,229,255,0.1); color:#fff; }
        .cal-day.today { border:1px solid rgba(0,229,255,0.3); color:#00e5ff; }
        .cal-day.selected { background:rgba(0,229,255,0.2); color:#fff; font-weight:700; }
        .cal-day.has-visits::after {
            content:''; position:absolute; bottom:2px; left:50%; transform:translateX(-50%);
            width:4px; height:4px; border-radius:50%; background:#00e5ff;
        }
        .cal-day.empty { cursor:default; }

        /* Add visit modal */
        .modal-overlay {
            display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:300;
            align-items:center; justify-content:center;
        }
        .modal-overlay.open { display:flex; }
        .modal-box {
            background:rgba(10,14,23,0.98); border:1px solid rgba(0,229,255,0.2); border-radius:12px;
            padding:24px; width:420px; max-width:95vw;
        }
        .modal-box h2 { font-family:'Orbitron',monospace; color:#00e5ff; font-size:16px; margin-bottom:16px; }
        .modal-box label { display:block; font-size:13px; color:rgba(0,229,255,0.6); margin:10px 0 4px; font-weight:600; }
        .modal-box input, .modal-box select, .modal-box textarea {
            width:100%; background:rgba(12,16,28,0.9); color:#ccc; border:1px solid rgba(0,229,255,0.15);
            padding:8px 12px; border-radius:6px; font-family:'Rajdhani',sans-serif; font-size:14px;
        }
        .modal-box textarea { height:60px; resize:vertical; }
        .modal-box .btn-row { display:flex; gap:10px; margin-top:16px; justify-content:flex-end; }
        .modal-box .btn-cancel {
            background:none; border:1px solid rgba(255,255,255,0.1); color:rgba(255,255,255,0.5);
            padding:8px 16px; border-radius:6px; cursor:pointer; font-size:13px;
        }
        .modal-box .btn-save {
            background:rgba(0,229,255,0.15); border:1px solid rgba(0,229,255,0.3); color:#00e5ff;
            padding:8px 20px; border-radius:6px; cursor:pointer; font-family:'Orbitron',monospace;
            font-size:11px; letter-spacing:1px;
        }
        .modal-box .btn-save:hover { background:rgba(0,229,255,0.25); }
        .patient-search-results {
            max-height:150px; overflow-y:auto; background:rgba(12,16,28,0.95);
            border:1px solid rgba(0,229,255,0.15); border-top:none; border-radius:0 0 6px 6px;
        }
        .patient-search-results div {
            padding:8px 12px; cursor:pointer; font-size:13px; color:#ccc;
        }
        .patient-search-results div:hover { background:rgba(0,229,255,0.1); color:#fff; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="logo">SRO INTELLIGENCE</div>
        <div class="nav-links">
            <a href="/dashboard.html">Dashboard</a>
            <a href="/clinic-worklist.html" class="active">Worklist</a>
            <a href="/preop.html">Pre-Op</a>
            <a href="/surgical-prep.html">Surg Prep</a>
            <a href="/analytics.html">Analytics</a>
        </div>
        <a href="#" onclick="setLanding('worklist');return false" style="font-size:12px;color:rgba(0,229,255,0.4);text-decoration:none;margin-left:auto;" title="Make Worklist your startup page">Set as default</a>
    </div>

    <div class="page-header">
        <div class="page-title">CLINIC WORKLIST</div>
        <div class="date-nav">
            <button onclick="stepDay(-1)">&#9664; PREV</button>
            <div class="date-display" id="dateDisplay" onclick="openCalendar()">Loading...</div>
            <button onclick="stepDay(1)">NEXT &#9654;</button>
            <button onclick="goToday()" style="margin-left:4px;">TODAY</button>
        </div>
        <div class="filters">
            <select id="surgeonFilter" onchange="loadVisits()">
                <option value="">All Surgeons</option>
            </select>
            <button class="btn-add" onclick="openAddModal()">+ ADD VISIT</button>
        </div>
    </div>

    <div class="summary-bar" id="summaryBar"></div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Time</th><th>Patient</th><th>MRN</th><th>Age</th>
                    <th>Visit Type</th><th>Surgery</th><th>Stage</th><th>Pain</th>
                    <th>Status</th><th>Actions</th>
                </tr>
            </thead>
            <tbody id="visitTableBody">
                <tr><td colspan="10" class="empty-state"><h3>Loading...</h3></td></tr>
            </tbody>
        </table>
    </div>

    <div class="footer">
        <a href="/dashboard.html">&larr; Back to Dashboard</a>
        <span id="lastRefreshed">Last refreshed: --:--:--</span>
    </div>

    <!-- Calendar popup -->
    <div class="cal-overlay" id="calOverlay" onclick="if(event.target===this)closeCalendar()">
        <div class="cal-box">
            <div class="cal-header">
                <button onclick="calStep(-1)">&#9664;</button>
                <span id="calMonthLabel"></span>
                <button onclick="calStep(1)">&#9654;</button>
            </div>
            <div class="cal-grid" id="calGrid"></div>
        </div>
    </div>

    <!-- Add visit modal -->
    <div class="modal-overlay" id="addModal" onclick="if(event.target===this)closeAddModal()">
        <div class="modal-box">
            <h2>Schedule Visit</h2>
            <label>Patient</label>
            <input type="text" id="addPatientSearch" placeholder="Search by name or MRN..." oninput="searchPatients(this.value)">
            <div class="patient-search-results" id="patientResults" style="display:none"></div>
            <input type="hidden" id="addPatientId">
            <input type="hidden" id="addEpisodeId">
            <label>Date</label>
            <input type="date" id="addDate">
            <label>Time</label>
            <input type="time" id="addTime">
            <label>Visit Type</label>
            <select id="addType">
                <option value="follow_up">Follow-up</option>
                <option value="new_patient">New Patient</option>
                <option value="pre_op">Pre-Op</option>
                <option value="post_op">Post-Op</option>
                <option value="injection">Injection</option>
                <option value="consult">Consult</option>
            </select>
            <label>Chief Complaint</label>
            <textarea id="addComplaint" placeholder="Optional..."></textarea>
            <div class="btn-row">
                <button class="btn-cancel" onclick="closeAddModal()">Cancel</button>
                <button class="btn-save" onclick="saveVisit()">SAVE</button>
            </div>
        </div>
    </div>

    <script>
    function setLanding(page) {
        localStorage.setItem('sro-landing-page', page);
        var t = document.createElement('div');
        t.textContent = 'Default landing page updated';
        t.style.cssText = 'position:fixed;top:16px;left:50%;transform:translateX(-50%);background:rgba(10,14,23,0.95);color:#00e5ff;padding:10px 24px;border-radius:8px;border:1px solid rgba(0,229,255,0.3);font-size:13px;z-index:9999;font-family:Rajdhani,sans-serif;opacity:0;transition:opacity 0.3s;';
        document.body.appendChild(t);
        requestAnimationFrame(function(){ t.style.opacity='1'; });
        setTimeout(function(){ t.style.opacity='0'; setTimeout(function(){ t.remove(); },300); },2000);
    }

    var CLINIC_ID = '11111111-1111-1111-1111-111111111111';
    var currentDate = null;
    var visits = [];
    var calMonth = null;
    var calDatesWithVisits = {};

    // Init
    (function() {
        var p = new URLSearchParams(window.location.search);
        var d = p.get('date');
        currentDate = d ? new Date(d + 'T00:00:00') : new Date();
        calMonth = new Date(currentDate);
        loadSurgeons();
        loadVisits();
    })();

    function fmtDate(d) {
        return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }
    function fmtDisplay(d) {
        var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        return days[d.getDay()] + ', ' + months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
    }
    function fmtTime(t) {
        if (!t) return '--';
        var parts = t.split(':');
        var h = parseInt(parts[0]), m = parts[1];
        var ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12 || 12;
        return h + ':' + m + ' ' + ampm;
    }
    function calcAge(dob) {
        if (!dob) return '--';
        return Math.floor((Date.now() - new Date(dob).getTime()) / (365.25*24*60*60*1000));
    }

    function stepDay(n) {
        currentDate.setDate(currentDate.getDate() + n);
        loadVisits();
    }
    function goToday() {
        currentDate = new Date();
        loadVisits();
    }

    async function loadSurgeons() {
        try {
            var users = await fetch('/api/users?clinic_id=' + CLINIC_ID).then(r => r.ok ? r.json() : []);
            var sel = document.getElementById('surgeonFilter');
            (Array.isArray(users) ? users : []).filter(u => u.role === 'surgeon').forEach(function(u) {
                var opt = document.createElement('option');
                opt.value = u.id;
                opt.textContent = 'Dr. ' + u.last_name;
                sel.appendChild(opt);
            });
        } catch(e) {}
    }

    async function loadVisits() {
        document.getElementById('dateDisplay').textContent = fmtDisplay(currentDate);
        var dateStr = fmtDate(currentDate);
        var surgeon = document.getElementById('surgeonFilter').value;
        var url = '/api/clinic-visits?clinic_id=' + CLINIC_ID + '&visit_date=' + dateStr;
        if (surgeon) url += '&surgeon_id=' + surgeon;
        try {
            var data = await fetch(url).then(r => r.json());
            visits = Array.isArray(data) ? data : [];
        } catch(e) { visits = []; }
        renderTable();
        renderSummary();
        updateRefreshTime();
    }

    function renderSummary() {
        var total = visits.length;
        var checkedIn = visits.filter(v => v.visit_status === 'checked_in').length;
        var inProgress = visits.filter(v => v.visit_status === 'in_progress').length;
        var completed = visits.filter(v => v.visit_status === 'completed').length;
        var noShow = visits.filter(v => v.visit_status === 'no_show').length;
        document.getElementById('summaryBar').innerHTML =
            '<div class="summary-item"><span class="count count-total">' + total + '</span> Total</div>' +
            '<div class="summary-item"><span class="count count-checkedin">' + checkedIn + '</span> Checked In</div>' +
            '<div class="summary-item"><span class="count count-inprogress">' + inProgress + '</span> In Progress</div>' +
            '<div class="summary-item"><span class="count count-completed">' + completed + '</span> Completed</div>' +
            (noShow ? '<div class="summary-item"><span class="count count-noshow">' + noShow + '</span> No-Show</div>' : '');
    }

    function renderTable() {
        var tbody = document.getElementById('visitTableBody');
        if (!visits.length) {
            tbody.innerHTML = '<tr><td colspan="10"><div class="empty-state"><h3>No patients scheduled</h3><p>' + fmtDisplay(currentDate) + '</p></div></td></tr>';
            return;
        }
        var dateStr = fmtDate(currentDate);
        var _layout = localStorage.getItem('sro-cockpit-layout') || 'circle';
        var _pages = { circle: '/cockpit-view.html', grid: '/cockpit-grid.html', gridimg: '/cockpit-grid-img.html' };
        var cockpitPage = _pages[_layout] || '/cockpit-view.html';
        tbody.innerHTML = visits.map(function(v) {
            var rowClass = '';
            if (v.visit_status === 'in_progress') rowClass = 'row-active';
            else if (v.visit_status === 'completed') rowClass = 'row-completed';
            else if (v.visit_status === 'no_show' || v.visit_status === 'cancelled') rowClass = 'row-noshow';

            var painClass = 'pain-none', painText = '--';
            if (v.last_pain != null) {
                painText = v.last_pain + '/10';
                painClass = v.last_pain <= 3 ? 'pain-low' : v.last_pain <= 6 ? 'pain-mid' : 'pain-high';
            }

            var typeBadge = {
                new_patient:'badge-new', follow_up:'badge-follow', pre_op:'badge-preop',
                post_op:'badge-postop', injection:'badge-injection', consult:'badge-consult'
            }[v.visit_type] || 'badge-follow';
            var typeLabel = (v.visit_type || 'follow_up').replace(/_/g,' ');

            var statusBadge = 'badge-' + (v.visit_status || 'scheduled');
            if (v.visit_status === 'completed') statusBadge = 'badge-completedst';
            var statusLabel = (v.visit_status || 'scheduled').replace(/_/g,' ');

            return '<tr class="' + rowClass + '">' +
                '<td>' + fmtTime(v.visit_time) + '</td>' +
                '<td><a class="patient-link" href="' + cockpitPage + '?patient=' + v.patient_id + '&returnTo=worklist&date=' + dateStr + '">' + (v.last_name||'') + ', ' + (v.first_name||'') + '</a></td>' +
                '<td style="color:rgba(0,229,255,0.6)">' + (v.mrn||'--') + '</td>' +
                '<td>' + calcAge(v.date_of_birth) + '</td>' +
                '<td><span class="badge ' + typeBadge + '">' + typeLabel + '</span></td>' +
                '<td>' + (v.surgery_type||'--') + '</td>' +
                '<td><span class="stage-badge">' + (v.episode_stage||'--') + '</span></td>' +
                '<td class="' + painClass + '">' + painText + '</td>' +
                '<td><span class="badge ' + statusBadge + '">' + statusLabel + '</span></td>' +
                '<td class="actions">' +
                    '<a class="btn-cockpit" href="' + cockpitPage + '?patient=' + v.patient_id + '&returnTo=worklist&date=' + dateStr + '">COCKPIT</a>' +
                    '<a class="btn-cockpit" href="/nurse-cockpit.html?patient=' + v.patient_id + '&returnTo=worklist&date=' + dateStr + '" style="background:rgba(212,160,74,0.15);border-color:rgba(212,160,74,0.4);color:#d4a04a;">NURSE</a>' +
                    '<button class="btn-status" onclick="cycleStatus(\'' + v.id + '\',\'' + (v.visit_status||'scheduled') + '\')" title="Advance status">&#10003;</button>' +
                '</td></tr>';
        }).join('');
    }

    async function cycleStatus(id, current) {
        var order = ['scheduled','checked_in','in_progress','completed'];
        var idx = order.indexOf(current);
        var next = order[(idx + 1) % order.length];
        await fetch('/api/clinic-visits/' + id, {
            method:'PUT', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ visit_status: next })
        });
        loadVisits();
    }

    function updateRefreshTime() {
        document.getElementById('lastRefreshed').textContent = 'Last refreshed: ' + new Date().toLocaleTimeString();
    }

    // Auto-refresh every 30 seconds
    setInterval(loadVisits, 30000);

    // Calendar
    function openCalendar() {
        calMonth = new Date(currentDate);
        loadCalDates();
        document.getElementById('calOverlay').classList.add('open');
    }
    function closeCalendar() { document.getElementById('calOverlay').classList.remove('open'); }
    function calStep(n) {
        calMonth.setMonth(calMonth.getMonth() + n);
        loadCalDates();
    }
    async function loadCalDates() {
        var ym = calMonth.getFullYear() + '-' + String(calMonth.getMonth()+1).padStart(2,'0');
        try {
            var data = await fetch('/api/clinic-visits/dates?clinic_id=' + CLINIC_ID + '&month=' + ym).then(r => r.json());
            calDatesWithVisits = {};
            (Array.isArray(data) ? data : []).forEach(function(d) { calDatesWithVisits[d.visit_date] = d.visit_count; });
        } catch(e) { calDatesWithVisits = {}; }
        renderCalendar();
    }
    function renderCalendar() {
        var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
        document.getElementById('calMonthLabel').textContent = months[calMonth.getMonth()] + ' ' + calMonth.getFullYear();
        var grid = document.getElementById('calGrid');
        var html = ['Su','Mo','Tu','We','Th','Fr','Sa'].map(d => '<div class="cal-day-label">' + d + '</div>').join('');
        var first = new Date(calMonth.getFullYear(), calMonth.getMonth(), 1);
        var last = new Date(calMonth.getFullYear(), calMonth.getMonth()+1, 0);
        var todayStr = fmtDate(new Date());
        var selStr = fmtDate(currentDate);
        for (var i = 0; i < first.getDay(); i++) html += '<div class="cal-day empty"></div>';
        for (var d = 1; d <= last.getDate(); d++) {
            var ds = calMonth.getFullYear() + '-' + String(calMonth.getMonth()+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
            var cls = 'cal-day';
            if (ds === todayStr) cls += ' today';
            if (ds === selStr) cls += ' selected';
            if (calDatesWithVisits[ds]) cls += ' has-visits';
            html += '<div class="' + cls + '" onclick="pickDate(\'' + ds + '\')">' + d + '</div>';
        }
        grid.innerHTML = html;
    }
    function pickDate(ds) {
        currentDate = new Date(ds + 'T00:00:00');
        closeCalendar();
        loadVisits();
    }

    // Add visit modal
    function openAddModal() {
        document.getElementById('addDate').value = fmtDate(currentDate);
        document.getElementById('addPatientSearch').value = '';
        document.getElementById('addPatientId').value = '';
        document.getElementById('addEpisodeId').value = '';
        document.getElementById('addTime').value = '';
        document.getElementById('addComplaint').value = '';
        document.getElementById('patientResults').style.display = 'none';
        document.getElementById('addModal').classList.add('open');
    }
    function closeAddModal() { document.getElementById('addModal').classList.remove('open'); }

    var searchTimeout = null;
    function searchPatients(q) {
        clearTimeout(searchTimeout);
        if (q.length < 2) { document.getElementById('patientResults').style.display = 'none'; return; }
        searchTimeout = setTimeout(async function() {
            try {
                var all = await fetch('/api/patients?clinic_id=' + CLINIC_ID).then(r => r.json());
                var filtered = (Array.isArray(all) ? all : []).filter(function(p) {
                    var name = ((p.first_name||'') + ' ' + (p.last_name||'')).toLowerCase();
                    return name.includes(q.toLowerCase()) || (p.mrn||'').includes(q);
                }).slice(0, 10);
                var div = document.getElementById('patientResults');
                if (!filtered.length) { div.style.display = 'none'; return; }
                div.innerHTML = filtered.map(function(p) {
                    return '<div onclick="selectPatient(\'' + p.id + '\',\'' + (p.episode_id||'') + '\',\'' + (p.last_name||'') + ', ' + (p.first_name||'') + '\')">' +
                        (p.last_name||'') + ', ' + (p.first_name||'') + ' <span style="color:rgba(0,229,255,0.5)">MRN:' + (p.mrn||'') + '</span></div>';
                }).join('');
                div.style.display = 'block';
            } catch(e) {}
        }, 300);
    }
    function selectPatient(id, episodeId, name) {
        document.getElementById('addPatientId').value = id;
        document.getElementById('addEpisodeId').value = episodeId;
        document.getElementById('addPatientSearch').value = name;
        document.getElementById('patientResults').style.display = 'none';
    }

    async function saveVisit() {
        var patientId = document.getElementById('addPatientId').value;
        if (!patientId) { alert('Select a patient'); return; }
        await fetch('/api/clinic-visits', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({
                patient_id: patientId,
                episode_id: document.getElementById('addEpisodeId').value || null,
                clinic_id: CLINIC_ID,
                visit_date: document.getElementById('addDate').value,
                visit_time: document.getElementById('addTime').value || null,
                visit_type: document.getElementById('addType').value,
                chief_complaint: document.getElementById('addComplaint').value || null
            })
        });
        closeAddModal();
        loadVisits();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') { closeCalendar(); closeAddModal(); }
    });
    </script>
    <script src="/js/cockpit-btn.js"></script>
</body>
</html>
