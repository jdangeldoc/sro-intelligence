<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nurse Tasks | SRO Intelligence</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .tasks-container { max-width: 1200px; margin: 0 auto; padding: 24px; }
        
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .page-header h1 { margin: 0; font-size: 1.6rem; color: #1e293b; }
        .page-header p { margin: 4px 0 0 0; color: #6b7280; font-size: 0.95rem; }
        
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
        .stat-box { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); text-align: center; }
        .stat-box.urgent { border-top: 4px solid #dc2626; }
        .stat-box.warning { border-top: 4px solid #f59e0b; }
        .stat-box.pending { border-top: 4px solid #2c5aa0; }
        .stat-box.done { border-top: 4px solid #059669; }
        .stat-box .number { font-size: 2.2rem; font-weight: 700; color: #1e293b; }
        .stat-box .label { font-size: 0.85rem; color: #6b7280; margin-top: 4px; }
        
        .section-title { font-size: 1.1rem; font-weight: 600; color: #1e293b; margin: 24px 0 12px 0; display: flex; align-items: center; gap: 8px; }
        .section-title .badge { background: #dc2626; color: white; font-size: 0.75rem; padding: 2px 8px; border-radius: 10px; }
        
        .task-list { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow: hidden; }
        .task-item { display: grid; grid-template-columns: auto 1fr auto auto; gap: 16px; padding: 16px 20px; border-bottom: 1px solid #f3f4f6; align-items: center; }
        .task-item:last-child { border-bottom: none; }
        .task-item:hover { background: #f9fafb; }
        .task-item.high { border-left: 4px solid #dc2626; }
        .task-item.medium { border-left: 4px solid #f59e0b; }
        .task-item.low { border-left: 4px solid #2c5aa0; }
        .task-item.completed { opacity: 0.6; background: #f9fafb; }
        
        .task-icon { font-size: 1.5rem; }
        .task-content h4 { margin: 0 0 4px 0; font-size: 0.95rem; color: #1e293b; }
        .task-content p { margin: 0; font-size: 0.85rem; color: #6b7280; }
        .task-content .patient-link { color: #2c5aa0; text-decoration: none; font-weight: 500; }
        .task-content .patient-link:hover { text-decoration: underline; }
        .task-meta { text-align: right; font-size: 0.8rem; color: #9ca3af; }
        .task-meta .time { display: block; }
        .task-meta .attempts { color: #dc2626; font-weight: 500; }
        
        .task-actions { display: flex; gap: 8px; }
        .btn-sm { padding: 6px 12px; border-radius: 6px; font-size: 0.8rem; font-weight: 500; cursor: pointer; border: none; }
        .btn-retry { background: #2c5aa0; color: white; }
        .btn-retry:hover { background: #1e4080; }
        .btn-complete { background: #059669; color: white; }
        .btn-complete:hover { background: #047857; }
        .btn-dismiss { background: #f3f4f6; color: #374151; }
        .btn-dismiss:hover { background: #e5e7eb; }
        
        .empty-state { text-align: center; padding: 60px 20px; color: #6b7280; }
        .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
        .empty-state h3 { margin: 0 0 8px 0; color: #374151; }
        
        .tabs { display: flex; gap: 4px; margin-bottom: 20px; }
        .tab { padding: 10px 20px; background: #f3f4f6; border: none; font-size: 0.9rem; font-weight: 500; color: #6b7280; cursor: pointer; border-radius: 8px; }
        .tab:hover { background: #e5e7eb; }
        .tab.active { background: #2c5aa0; color: white; }
        
        .fax-details { background: #f9fafb; border-radius: 8px; padding: 12px; margin-top: 8px; font-size: 0.85rem; }
        .fax-details .row { display: flex; gap: 20px; margin-bottom: 4px; }
        .fax-details .label { color: #6b7280; min-width: 80px; }
        .fax-details .value { color: #1e293b; }
        
        .refresh-btn { background: #f3f4f6; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; gap: 6px; }
        .refresh-btn:hover { background: #e5e7eb; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <div class="logo-icon">SRO</div>
            <span class="nav-title">SRO Intelligence</span>
        </div>
        <div class="nav-links">
            <a href="/dashboard.html" class="nav-link">Dashboard</a>
            <a href="/preop.html" class="nav-link">Pre-Op</a>
            <a href="/surgical-prep.html" class="nav-link">Surg Prep</a>
            <a href="/nonop-plan.html" class="nav-link">Conservative Care</a>
            <a href="/analytics.html" class="nav-link">Analytics</a>
            <a href="/cms-compliance.html" class="nav-link">CMS Compliance</a>
            <a href="/rpm-report.html" class="nav-link">RPM Billing</a>
            <a href="/settings.html" class="nav-link">Settings</a>
        </div>
        <div class="nav-user">
            <span id="userDisplay"></span>
            <button class="btn btn-sm btn-secondary" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="tasks-container">
        <div class="page-header">
            <div>
                <h1>📋 Nurse Task Dashboard</h1>
                <p>Failed faxes, pending follow-ups, and action items</p>
            </div>
            <button class="refresh-btn" onclick="loadAll()">🔄 Refresh</button>
        </div>

        <div class="stats-row">
            <div class="stat-box urgent">
                <div class="number" id="statUrgent">0</div>
                <div class="label">Failed Faxes</div>
            </div>
            <div class="stat-box warning">
                <div class="number" id="statPending">0</div>
                <div class="label">Pending Tasks</div>
            </div>
            <div class="stat-box pending">
                <div class="number" id="statToday">0</div>
                <div class="label">Due Today</div>
            </div>
            <div class="stat-box done">
                <div class="number" id="statCompleted">0</div>
                <div class="label">Completed Today</div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('failed')">❌ Failed Faxes</button>
            <button class="tab" onclick="switchTab('pending')">⏳ Pending Faxes</button>
            <button class="tab" onclick="switchTab('tasks')">📝 Other Tasks</button>
            <button class="tab" onclick="switchTab('completed')">✅ Completed</button>
        </div>

        <!-- Failed Faxes Tab -->
        <div id="tab-failed" class="tab-content">
            <div id="failed-list" class="task-list"></div>
        </div>

        <!-- Pending Faxes Tab -->
        <div id="tab-pending" class="tab-content" style="display:none;">
            <div id="pending-list" class="task-list"></div>
        </div>

        <!-- Other Tasks Tab -->
        <div id="tab-tasks" class="tab-content" style="display:none;">
            <div id="tasks-list" class="task-list"></div>
        </div>

        <!-- Completed Tab -->
        <div id="tab-completed" class="tab-content" style="display:none;">
            <div id="completed-list" class="task-list"></div>
        </div>
    </div>

    <script>
    const CLINIC_ID = '11111111-1111-1111-1111-111111111111';
    let faxQueue = [];
    let nurseTasks = [];
    let orders = [];
    let patients = [];

    document.addEventListener('DOMContentLoaded', async () => {
        document.getElementById('userDisplay').textContent = sessionStorage.getItem('userName') || '';
        await loadAll();
    });

    async function loadAll() {
        try {
            // Load fax queue
            const faxResp = await fetch('/api/fax-queue?clinic_id=' + CLINIC_ID);
            if (faxResp.ok) faxQueue = await faxResp.json();
            
            // Load nurse tasks
            const taskResp = await fetch('/api/nurse-tasks?clinic_id=' + CLINIC_ID);
            if (taskResp.ok) nurseTasks = await taskResp.json();
            
            // Load orders for reference
            const orderResp = await fetch('/api/orders?clinic_id=' + CLINIC_ID);
            if (orderResp.ok) orders = await orderResp.json();
            
            // Load patients for names
            const patResp = await fetch('/api/patients?clinic_id=' + CLINIC_ID);
            if (patResp.ok) patients = await patResp.json();
            
            updateStats();
            renderAllLists();
        } catch (e) {
            console.error('Load failed:', e);
        }
    }

    function updateStats() {
        const failedFaxes = faxQueue.filter(f => f.status === 'failed');
        const pendingFaxes = faxQueue.filter(f => f.status === 'pending' || f.status === 'queued');
        const pendingTasks = nurseTasks.filter(t => t.status !== 'completed' && t.status !== 'dismissed');
        const completedToday = nurseTasks.filter(t => {
            if (t.status !== 'completed') return false;
            const today = new Date().toDateString();
            return new Date(t.completed_at).toDateString() === today;
        });
        
        document.getElementById('statUrgent').textContent = failedFaxes.length;
        document.getElementById('statPending').textContent = pendingTasks.length;
        document.getElementById('statToday').textContent = pendingFaxes.length;
        document.getElementById('statCompleted').textContent = completedToday.length;
    }

    function renderAllLists() {
        renderFailedFaxes();
        renderPendingFaxes();
        renderTasks();
        renderCompleted();
    }

    function getPatientName(patientId) {
        const p = patients.find(x => x.id === patientId);
        return p ? (p.last_name + ', ' + p.first_name) : 'Unknown Patient';
    }

    function getOrderInfo(orderId) {
        return orders.find(o => o.id === orderId);
    }

    function formatTime(dateStr) {
        if (!dateStr) return '';
        const d = new Date(dateStr);
        const now = new Date();
        const diffMs = now - d;
        const diffMins = Math.floor(diffMs / 60000);
        const diffHrs = Math.floor(diffMs / 3600000);
        const diffDays = Math.floor(diffMs / 86400000);
        
        if (diffMins < 60) return diffMins + ' min ago';
        if (diffHrs < 24) return diffHrs + ' hr ago';
        if (diffDays < 7) return diffDays + ' day' + (diffDays > 1 ? 's' : '') + ' ago';
        return d.toLocaleDateString();
    }

    function renderFailedFaxes() {
        const failed = faxQueue.filter(f => f.status === 'failed');
        const list = document.getElementById('failed-list');
        
        if (failed.length === 0) {
            list.innerHTML = '<div class="empty-state"><div class="icon">✅</div><h3>No failed faxes</h3><p>All faxes have been sent successfully.</p></div>';
            return;
        }
        
        list.innerHTML = failed.map(f => {
            const order = getOrderInfo(f.order_id);
            const patientName = order ? getPatientName(order.patient_id) : 'Unknown';
            const orderDesc = order ? order.description : 'Unknown Order';
            
            return `
                <div class="task-item high">
                    <div class="task-icon">📠</div>
                    <div class="task-content">
                        <h4>Fax Failed: ${escapeHtml(orderDesc)}</h4>
                        <p>
                            Patient: <a href="/nonop-plan.html?patient=${order?.patient_id || ''}" class="patient-link">${escapeHtml(patientName)}</a>
                            &nbsp;|&nbsp; Fax: ${escapeHtml(f.fax_number)}
                        </p>
                        <div class="fax-details">
                            <div class="row"><span class="label">Order #:</span> <span class="value">${order?.order_number || 'N/A'}</span></div>
                            <div class="row"><span class="label">Error:</span> <span class="value">${escapeHtml(f.error_message) || 'Unknown error'}</span></div>
                        </div>
                    </div>
                    <div class="task-meta">
                        <span class="time">${formatTime(f.last_attempt_at || f.created_at)}</span>
                        <span class="attempts">${f.attempts || 0}/3 attempts</span>
                    </div>
                    <div class="task-actions">
                        <button class="btn-sm btn-retry" onclick="retryFax('${f.id}')">🔄 Retry</button>
                        <button class="btn-sm btn-dismiss" onclick="markFaxManual('${f.id}')">📞 Manual</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderPendingFaxes() {
        const pending = faxQueue.filter(f => f.status === 'pending' || f.status === 'queued');
        const list = document.getElementById('pending-list');
        
        if (pending.length === 0) {
            list.innerHTML = '<div class="empty-state"><div class="icon">📭</div><h3>No pending faxes</h3><p>All faxes have been processed.</p></div>';
            return;
        }
        
        list.innerHTML = pending.map(f => {
            const order = getOrderInfo(f.order_id);
            const patientName = order ? getPatientName(order.patient_id) : 'Unknown';
            const orderDesc = order ? order.description : 'Unknown Order';
            
            return `
                <div class="task-item medium">
                    <div class="task-icon">⏳</div>
                    <div class="task-content">
                        <h4>Pending: ${escapeHtml(orderDesc)}</h4>
                        <p>
                            Patient: <a href="/nonop-plan.html?patient=${order?.patient_id || ''}" class="patient-link">${escapeHtml(patientName)}</a>
                            &nbsp;|&nbsp; Fax: ${escapeHtml(f.fax_number)}
                        </p>
                    </div>
                    <div class="task-meta">
                        <span class="time">Queued ${formatTime(f.created_at)}</span>
                    </div>
                    <div class="task-actions">
                        <button class="btn-sm btn-dismiss" onclick="cancelFax('${f.id}')">Cancel</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderTasks() {
        const tasks = nurseTasks.filter(t => t.status !== 'completed' && t.status !== 'dismissed');
        const list = document.getElementById('tasks-list');
        
        if (tasks.length === 0) {
            list.innerHTML = '<div class="empty-state"><div class="icon">📋</div><h3>No pending tasks</h3><p>You\'re all caught up!</p></div>';
            return;
        }
        
        list.innerHTML = tasks.map(t => {
            const priorityClass = t.priority === 'high' ? 'high' : (t.priority === 'medium' ? 'medium' : 'low');
            const patientName = t.patient_id ? getPatientName(t.patient_id) : '';
            
            return `
                <div class="task-item ${priorityClass}">
                    <div class="task-icon">${t.task_type === 'fax_followup' ? '📠' : '📝'}</div>
                    <div class="task-content">
                        <h4>${escapeHtml(t.title)}</h4>
                        <p>
                            ${patientName ? `Patient: <a href="/nonop-plan.html?patient=${t.patient_id}" class="patient-link">${escapeHtml(patientName)}</a> | ` : ''}
                            ${escapeHtml(t.description) || ''}
                        </p>
                    </div>
                    <div class="task-meta">
                        <span class="time">${formatTime(t.created_at)}</span>
                    </div>
                    <div class="task-actions">
                        <button class="btn-sm btn-complete" onclick="completeTask('${t.id}')">✓ Done</button>
                        <button class="btn-sm btn-dismiss" onclick="dismissTask('${t.id}')">Dismiss</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderCompleted() {
        const completed = nurseTasks.filter(t => t.status === 'completed');
        const sentFaxes = faxQueue.filter(f => f.status === 'sent');
        const list = document.getElementById('completed-list');
        
        const items = [];
        
        // Add completed tasks
        completed.forEach(t => {
            items.push({
                type: 'task',
                time: t.completed_at || t.updated_at,
                html: `
                    <div class="task-item completed">
                        <div class="task-icon">✅</div>
                        <div class="task-content">
                            <h4>${escapeHtml(t.title)}</h4>
                            <p>${escapeHtml(t.description) || 'Task completed'}</p>
                        </div>
                        <div class="task-meta">
                            <span class="time">${formatTime(t.completed_at || t.updated_at)}</span>
                        </div>
                        <div class="task-actions"></div>
                    </div>
                `
            });
        });
        
        // Add sent faxes
        sentFaxes.forEach(f => {
            const order = getOrderInfo(f.order_id);
            items.push({
                type: 'fax',
                time: f.sent_at || f.updated_at,
                html: `
                    <div class="task-item completed">
                        <div class="task-icon">📠</div>
                        <div class="task-content">
                            <h4>Fax Sent: ${order ? escapeHtml(order.description) : 'Order'}</h4>
                            <p>Fax: ${escapeHtml(f.fax_number)}</p>
                        </div>
                        <div class="task-meta">
                            <span class="time">${formatTime(f.sent_at || f.updated_at)}</span>
                        </div>
                        <div class="task-actions"></div>
                    </div>
                `
            });
        });
        
        // Sort by time descending
        items.sort((a, b) => new Date(b.time) - new Date(a.time));
        
        if (items.length === 0) {
            list.innerHTML = '<div class="empty-state"><div class="icon">📭</div><h3>No completed items</h3><p>Completed tasks and sent faxes will appear here.</p></div>';
            return;
        }
        
        list.innerHTML = items.slice(0, 50).map(i => i.html).join('');
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        
        event.target.classList.add('active');
        document.getElementById('tab-' + tab).style.display = 'block';
    }

    async function retryFax(faxId) {
        try {
            await fetch('/api/fax-queue/' + faxId, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: 'pending', attempts: 0 })
            });
            await loadAll();
        } catch (e) {
            alert('Failed to retry fax.');
        }
    }

    async function markFaxManual(faxId) {
        if (!confirm('Mark this fax as handled manually (phone/in-person)?')) return;
        try {
            await fetch('/api/fax-queue/' + faxId, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: 'manual', notes: 'Handled manually by staff' })
            });
            await loadAll();
        } catch (e) {
            alert('Failed to update fax status.');
        }
    }

    async function cancelFax(faxId) {
        if (!confirm('Cancel this fax?')) return;
        try {
            await fetch('/api/fax-queue/' + faxId, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: 'cancelled' })
            });
            await loadAll();
        } catch (e) {
            alert('Failed to cancel fax.');
        }
    }

    async function completeTask(taskId) {
        try {
            await fetch('/api/nurse-tasks/' + taskId, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: 'completed', completed_at: new Date().toISOString(), completed_by: sessionStorage.getItem('userId') })
            });
            await loadAll();
        } catch (e) {
            alert('Failed to complete task.');
        }
    }

    async function dismissTask(taskId) {
        if (!confirm('Dismiss this task?')) return;
        try {
            await fetch('/api/nurse-tasks/' + taskId, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: 'dismissed' })
            });
            await loadAll();
        } catch (e) {
            alert('Failed to dismiss task.');
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function logout() { sessionStorage.clear(); window.location.href = '/index.html'; }
    </script>
<script src="/js/cockpit-btn.js"></script>
</body>
</html>
