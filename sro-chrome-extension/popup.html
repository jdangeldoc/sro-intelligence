<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a1628;
      color: #fff;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #1a5276, #2e86c1);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 15px;
      font-weight: 600;
    }

    .header-text p {
      font-size: 11px;
      color: #85c1e9;
      margin-top: 2px;
    }

    .btn-primary {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #1a5276, #2e86c1);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 10px;
      transition: opacity 0.15s;
    }

    .btn-primary:hover { opacity: 0.9; }

    .btn-secondary {
      width: 100%;
      padding: 8px;
      background: #0d1b2a;
      color: #85c1e9;
      border: 1px solid #1a3a5c;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      margin-bottom: 10px;
      transition: all 0.15s;
    }

    .btn-secondary:hover {
      background: #1a3a5c;
      color: #fff;
    }

    .divider {
      border: none;
      border-top: 1px solid #1a3a5c;
      margin: 12px 0;
    }

    label {
      display: block;
      font-size: 11px;
      color: #85c1e9;
      margin-bottom: 4px;
      font-weight: 500;
    }

    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      background: #0d1b2a;
      border: 1px solid #1a3a5c;
      border-radius: 4px;
      color: #fff;
      font-size: 12px;
      font-family: monospace;
      margin-bottom: 8px;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #2e86c1;
    }

    .save-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .save-btn {
      padding: 6px 14px;
      background: #1a5276;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      font-weight: 500;
    }

    .save-btn:hover { background: #2e86c1; }

    .save-status {
      font-size: 11px;
      color: #27ae60;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .save-status.visible { opacity: 1; }

    .status-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      padding: 6px 8px;
      background: #0d1b2a;
      border-radius: 4px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.checking { background: #f39c12; }
    .status-dot.online { background: #27ae60; }
    .status-dot.offline { background: #e74c3c; }

    .status-text {
      font-size: 11px;
      color: #85c1e9;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">S</div>
    <div class="header-text">
      <h1>SRO Intelligence</h1>
      <p>Clinical Decision Support</p>
    </div>
  </div>

  <button class="btn-primary" id="btnOpenPanel">Open Side Panel</button>
  <button class="btn-secondary" id="btnFullWindow">Open in Full Window ⤢</button>

  <hr class="divider">

  <label>SRO Server URL</label>
  <input type="text" id="urlInput" placeholder="http://192.168.x.x:3000">
  <div class="save-row">
    <button class="save-btn" id="btnSave">Save</button>
    <span class="save-status" id="saveStatus">Saved ✓</span>
  </div>

  <div class="status-row">
    <div class="status-dot checking" id="connDot"></div>
    <span class="status-text" id="connText">Checking connection...</span>
  </div>

  <script>
    const urlInput = document.getElementById('urlInput');
    const saveStatus = document.getElementById('saveStatus');
    const connDot = document.getElementById('connDot');
    const connText = document.getElementById('connText');

    // Load saved URL
    chrome.storage.local.get('sroUrl', (result) => {
      urlInput.value = result.sroUrl || 'http://localhost:3000';
      checkConnection(urlInput.value);
    });

    // Save URL
    document.getElementById('btnSave').addEventListener('click', () => {
      const url = urlInput.value.trim();
      if (!url) return;
      chrome.storage.local.set({ sroUrl: url }, () => {
        saveStatus.classList.add('visible');
        setTimeout(() => saveStatus.classList.remove('visible'), 2000);
        checkConnection(url);
      });
    });

    // Open side panel
    document.getElementById('btnOpenPanel').addEventListener('click', async () => {
      try {
        const [tab] = await chrome.tabs.query({ active: true, currentWindow: true });
        await chrome.sidePanel.open({ tabId: tab.id });
        window.close();
      } catch (e) {
        // Fallback: try window-level
        try {
          await chrome.sidePanel.open({ windowId: (await chrome.windows.getCurrent()).id });
          window.close();
        } catch (e2) {
          alert('Could not open side panel. Try right-clicking the extension icon and selecting "Open side panel".');
        }
      }
    });

    // Open in full window
    document.getElementById('btnFullWindow').addEventListener('click', () => {
      chrome.storage.local.get('sroUrl', (result) => {
        const url = result.sroUrl || 'http://localhost:3000';
        chrome.tabs.create({ url: url + '/dashboard.html' });
        window.close();
      });
    });

    // Check connection
    async function checkConnection(url) {
      connDot.className = 'status-dot checking';
      connText.textContent = 'Checking...';
      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 4000);
        const resp = await fetch(url.replace(/\/$/, '') + '/api/dashboard-stats?clinic_id=11111111-1111-1111-1111-111111111111', {
          signal: controller.signal,
          mode: 'no-cors'
        });
        clearTimeout(timeout);
        connDot.className = 'status-dot online';
        connText.textContent = 'Connected';
      } catch (e) {
        connDot.className = 'status-dot offline';
        connText.textContent = 'Not reachable — check NUC';
      }
    }
  </script>
</body>
</html>
